<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellYell电台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .player-box {
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1.1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* 下层：黑胶唱片 */
        #vinylImg {
            position: absolute;
            width: 74%;
            aspect-ratio: 1/1;
            right: -6%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            transition: right 0.9s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* 旋转动画 */
        #vinylImg.spin {
            animation: rotate 9s linear infinite;
        }
        @keyframes rotate {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        /* 上层：电唱机机身 */
        #machineImg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        /* 热区容器 */
        .hotspots {
            position: absolute;
            inset: 0;
            z-index: 20;
        }

        /* 热区按钮 */
        .hotspot {
            position: absolute;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 25;
        }

        /* 歌曲信息浮层 */
        .music-info {
            position: absolute;
            top: 9%;
            left: 8%;
            width: 48%;
            z-index: 30;
            color: #fff;
        }
        .music-name {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
        }
        .music-name.marquee {
            display: inline-block;
            animation: textScroll 7s linear infinite;
        }
        @keyframes textScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .singer-name {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 18px;
        }
        .progress-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>

<body>
<div class="player-box">
    <!-- 1. 下层：黑胶唱片 -->
    <img id="vinylImg" src="https://radio.hellyell.com/cp.png" alt="唱片">

    <!-- 2. 上层：电唱机机身 -->
    <img id="machineImg" src="https://radio.hellyell.com/dcj.png" alt="电唱机">

    <!-- 3. 热区点击 -->
    <div class="hotspots">
        <button class="hotspot" id="volMinus" style="width:12%;height:12%;top:64%;left:68%"></button>
        <button class="hotspot" id="volPlus" style="width:12%;height:12%;top:64%;left:80%"></button>
        <button class="hotspot" id="prevBtn" style="width:10%;height:10%;top:79%;left:63%"></button>
        <button class="hotspot" id="playBtn" style="width:14%;height:14%;top:77%;left:73%"></button>
        <button class="hotspot" id="nextBtn" style="width:10%;height:10%;top:79%;left:85%"></button>
    </div>

    <!-- 4. 歌曲信息 -->
    <div class="music-info">
        <div id="musicName" class="music-name"></div>
        <div id="singerName" class="singer-name"></div>
        <div class="progress-wrap">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>
</div>

<script>
    let audio = new Audio();
    let playlist = [];
    let currentIndex = 0;
    let isPlay = false;
    let volume = 0.65;
    const vinylImg = document.getElementById('vinylImg');

    // ======================================
    // 网易云真实歌手头像（严格校验）
    // ======================================
    async function getSingerAvatar(singerName) {
        try {
            const res = await fetch(`https://music.163.com/api/search/pc?s=${encodeURIComponent(singerName)}&type=100`);
            const data = await res.json();
            if (data.result?.artists?.length > 0) {
                console.log("✅ 网易云获取头像成功：", singerName);
                return data.result.artists[0].picUrl;
            }
        } catch (e) {
            console.log("❌ 网易云获取失败");
        }
        return `https://picsum.photos/seed/${singerName}/180/180`;
    }

    // ======================================
    // 加载你的JSON歌单 + 真实音频URL
    // ======================================
    async function loadAllList() {
        try {
            const [hj, qc] = await Promise.all([
                fetch('https://radio.hellyell.com/huaijiu-musiclist.json').then(r=>r.json()),
                fetch('https://radio.hellyell.com/qiche-musiclist.json').then(r=>r.json())
            ]);
            playlist = [...hj, ...qc];
            shuffleList();
            loadMusic(0);
        } catch (e) {
            console.error('歌单加载失败');
            playlist = [{name:'测试歌手 - 测试歌曲', url:'https://music.163.com/song/media/outer/url?id=1916319449.mp3'}];
            loadMusic(0);
        }
    }

    // 随机歌单
    function shuffleList() {
        for(let i=playlist.length-1;i>0;i--){
            const j = Math.floor(Math.random()*(i+1));
            [playlist[i],playlist[j]] = [playlist[j],playlist[i]];
        }
    }

    // ======================================
    // 加载歌曲 + 唱片进出仓动画
    // ======================================
    async function loadMusic(index) {
        if(!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const item = playlist[currentIndex];
        
        // 解析歌曲信息
        const [singer, music] = item.name.split(' - ');
        document.getElementById('singerName').innerText = singer;
        document.getElementById('musicName').innerText = music;

        // 歌曲名滚动
        const nameEl = document.getElementById('musicName');
        nameEl.classList.remove('marquee');
        setTimeout(()=>{
            if(nameEl.scrollWidth > nameEl.offsetWidth) nameEl.classList.add('marquee');
        },100);

        // 唱片出仓 → 进仓
        vinylImg.style.right = '-30%';
        setTimeout(()=>{
            vinylImg.style.right = '-6%';
            vinylImg.classList.add('spin');
        }, 450);

        // 加载真实音频
        audio.src = item.url;
        audio.volume = volume;
        audio.load();
    }

    // ======================================
    // 播放控制
    // ======================================
    function togglePlay() {
        if(isPlay){
            audio.pause();
            vinylImg.classList.remove('spin');
        }else{
            audio.play();
            vinylImg.classList.add('spin');
        }
        isPlay = !isPlay;
    }

    function prev(){ loadMusic(currentIndex-1); autoPlay(); }
    function next(){ loadMusic(currentIndex+1); autoPlay(); }
    function autoPlay(){ if(isPlay) setTimeout(()=>audio.play(), 900); }

    // ======================================
    // 音量点击控制
    // ======================================
    function initVolume() {
        document.getElementById('volMinus').onclick = () => {
            volume = Math.max(0, volume - 0.1);
            audio.volume = volume;
        };
        document.getElementById('volPlus').onclick = () => {
            volume = Math.min(1, volume + 0.1);
            audio.volume = volume;
        };
    }

    // 进度条
    audio.ontimeupdate = ()=>{
        const p = (audio.currentTime/audio.duration)*100;
        document.getElementById('progressBar').style.width = p+'%';
    };
    audio.onended = ()=> next();

    // ======================================
    // 初始化
    // ======================================
    window.onload = ()=>{
        loadAllList();
        initVolume();
        document.getElementById('playBtn').onclick = togglePlay;
        document.getElementById('prevBtn').onclick = prev;
        document.getElementById('nextBtn').onclick = next;
    };
</script>
</body>
</html>
