<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HellYell音乐电台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "MiSans", "小米兰亭", "Microsoft YaHei", sans-serif;
            font-weight: 700;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }

        .player-container {
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1.1;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen-section {
            height: 38%;
            background: #E60012;
            padding: 22px 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 3;
        }

        .music-info {
            width: 100%;
            color: #ffffff;
            text-align: left;
        }

        /* 歌曲名容器：和下方歌手名行同宽 */
        .music-name-wrapper {
            width: 100%;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .music-name {
            font-size: 30px;
            white-space: nowrap;
            display: inline-block;
        }
        /* 无缝循环滚动：仅长歌名触发 */
        .music-name.marquee {
            animation: textScroll 15s linear infinite;
        }
        @keyframes textScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 歌手名 + NOW PLAYING 同一行 */
        .singer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }
        .singer-name {
            font-size: 16px;
            opacity: 0.85;
        }
        .now-playing {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.7);
            visibility: hidden;
            animation: glowPulse 1.8s ease-in-out infinite;
            white-space: nowrap;
        }
        .now-playing.show {
            visibility: visible;
        }
        @keyframes glowPulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .time-progress {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255,255,255,0.65);
            font-family: "Courier New", monospace;
        }
        .progress-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
        }
        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
            position: relative;
        }
        .progress-thumb {
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
        }

        .control-section {
            height: 62%;
            padding: 32px 36px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 28px;
        }

        .speaker-area {
            width: 50%;
            aspect-ratio: 1/1;
            position: relative;
            margin-left: 8%;
        }
        .speaker-hole {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #141414;
            border-radius: 50%;
        }

        .btn-area {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .volume-box {
            position: relative;
            width: 80px;
            height: 80px;
        }
        .volume-knob {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .volume-knob::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 2.5px;
            height: 20px;
            background: #555;
        }
        .vol-label {
            position: absolute;
            font-size: 18px;
            color: #444;
            cursor: pointer;
        }
        .vol-minus { bottom: -24px; left: 12px; }
        .vol-plus { bottom: -24px; right: 12px; }

        .play-btns {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .ctrl-btn {
            background: transparent;
            border: none;
            font-size: 26px;
            color: #444;
            cursor: pointer;
        }
        .play-btn {
            font-size: 36px;
        }

        .pause-icon {
            display: inline-block;
            width: 16px;
            height: 24px;
            position: relative;
        }
        .pause-icon::before, .pause-icon::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 22px;
            background: #000;
            border-radius: 1px;
        }
        .pause-icon::before { left: 0; }
        .pause-icon::after { right: 0; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="screen-section">
        <div class="music-info">
            <div class="music-name-wrapper">
                <div id="musicName" class="music-name"></div>
            </div>
            <div class="singer-row">
                <div id="singerName" class="singer-name"></div>
                <div id="nowPlaying" class="now-playing">NOW PLAYING</div>
            </div>
        </div>
        <div class="time-progress">
            <div class="progress-wrap">
                <div id="progressBar" class="progress-bar">
                    <div id="progressThumb" class="progress-thumb"></div>
                </div>
            </div>
            <div class="time-row">
                <div id="currentTime">00:00</div>
                <div id="durationTime">00:00</div>
            </div>
        </div>
    </div>

    <div class="control-section">
        <div class="speaker-area" id="speakerArea"></div>
        <div class="btn-area">
            <div class="volume-box">
                <div id="volumeKnob" class="volume-knob"></div>
                <div class="vol-label vol-minus" id="volMinus">−</div>
                <div class="vol-label vol-plus" id="volPlus">+</div>
            </div>
            <div class="play-btns">
                <button id="playBtn" class="ctrl-btn play-btn">
                    <span id="playIcon">▶</span>
                    <span id="pauseIcon" class="pause-icon" style="display:none;"></span>
                </button>
                <button id="nextBtn" class="ctrl-btn">⏭</button>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = new Audio();
    let playlist = [];
    let filteredPlaylist = [];
    let currentIndex = 0;
    let isPlay = false;
    let volume = 0.5;
    let playCount = 0;

    const promoTrack = {
        name: "HellYell Radio - 欢迎收听HellYell音乐电台",
        url: "https://radio.hellyell.com/hy.mp3"
    };

    function createCircleSpeaker() {
        const container = document.getElementById('speakerArea');
        const rings = 5;
        const holesPerRing = [12, 18, 24, 30, 36];
        for (let r = 0; r < rings; r++) {
            const radius = 18 + r * 14;
            const count = holesPerRing[r];
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);
                const dot = document.createElement('div');
                dot.className = 'speaker-hole';
                dot.style.left = x + '%';
                dot.style.top = y + '%';
                container.appendChild(dot);
            }
        }
    }

    async function loadAllList() {
        try {
            const [hj, qc] = await Promise.all([
                fetch('https://radio.hellyell.com/huaijiu-musiclist.json').then(r=>r.json()),
                fetch('https://radio.hellyell.com/qiche-musiclist.json').then(r=>r.json())
            ]);
            playlist = [...hj, ...qc];
            filteredPlaylist = playlist.filter(item => {
                const [singer] = item.name.split(' - ');
                return singer !== 'HellYell怀旧电台' && singer !== 'HellYell汽车电台';
            });
            shuffleList(filteredPlaylist);
            loadMusic(0);
        } catch (e) {
            filteredPlaylist = [{name:'测试歌手 - 测试歌曲', url:'https://music.163.com/song/media/outer/url?id=1916319449.mp3'}];
            loadMusic(0);
        }
    }

    function shuffleList(list) {
        for(let i=list.length-1;i>0;i--){
            const j = Math.floor(Math.random()*(i+1));
            [list[i],list[j]] = [list[j],list[i]];
        }
    }

    function formatTime(t) {
        const m = Math.floor(t / 60).toString().padStart(2, '0');
        const s = Math.floor(t % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function loadMusic(index) {
        let targetTrack;

        if (playCount > 0 && playCount % 7 === 0) {
            targetTrack = promoTrack;
        } else {
            currentIndex = (index + filteredPlaylist.length) % filteredPlaylist.length;
            targetTrack = filteredPlaylist[currentIndex];
        }

        const [singer, music] = targetTrack.name.split(' - ');
        document.getElementById('singerName').innerText = singer;
        
        const nameEl = document.getElementById('musicName');
        const wrapper = document.querySelector('.music-name-wrapper');
        nameEl.classList.remove('marquee');
        
        // 先设置单份歌名，测量宽度
        nameEl.innerText = music;
        setTimeout(()=>{
            const isLongName = nameEl.scrollWidth > wrapper.offsetWidth;
            if (isLongName) {
                // 长歌名：改为“歌名　歌名”（一个中文全角空格）并开启滚动
                nameEl.innerText = `${music}　${music}`;
                nameEl.classList.add('marquee');
            } else {
                // 短歌名：保持单份，不滚动
                nameEl.innerText = music;
                nameEl.classList.remove('marquee');
            }
        }, 100);

        document.title = `${music}-${singer}-HellYell音乐电台`;

        document.getElementById('nowPlaying').classList.remove('show');
        document.getElementById('currentTime').innerText = '00:00';
        document.getElementById('durationTime').innerText = '00:00';

        audio.src = targetTrack.url;
        audio.volume = volume;
        audio.load();
    }

    function togglePlay() {
        if (isPlay) {
            audio.pause();
            document.getElementById('playIcon').style.display = 'inline';
            document.getElementById('pauseIcon').style.display = 'none';
            document.getElementById('nowPlaying').classList.remove('show');
        } else {
            audio.play();
            document.getElementById('playIcon').style.display = 'none';
            document.getElementById('pauseIcon').style.display = 'inline-block';
            document.getElementById('nowPlaying').classList.add('show');
        }
        isPlay = !isPlay;
    }

    function next() {
        playCount++;
        loadMusic(currentIndex + 1);
        if (isPlay) autoPlay();
    }

    function autoPlay() {
        setTimeout(()=>{
            audio.play();
            document.getElementById('playIcon').style.display = 'none';
            document.getElementById('pauseIcon').style.display = 'inline-block';
            document.getElementById('nowPlaying').classList.add('show');
        }, 300);
    }

    audio.onerror = () => { next(); };

    audio.ontimeupdate = ()=>{
        if (!audio.duration) return;
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressBar').style.width = p + '%';
        document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
        document.getElementById('durationTime').innerText = formatTime(audio.duration);
    };

    audio.onended = ()=> { next(); };

    function initVolumeClick() {
        const volMinus = document.getElementById('volMinus');
        const volPlus = document.getElementById('volPlus');
        const knob = document.getElementById('volumeKnob');

        volMinus.onclick = () => {
            volume = Math.max(0, (Math.round(volume * 10) / 10) - 0.1);
            audio.volume = volume;
            knob.style.transform = `rotate(${(-90 + volume * 270)}deg)`;
        };
        volPlus.onclick = () => {
            volume = Math.min(1, (Math.round(volume * 10) / 10) + 0.1);
            audio.volume = volume;
            knob.style.transform = `rotate(${(-90 + volume * 270)}deg)`;
        };
        knob.style.transform = `rotate(${(-90 + volume * 270)}deg)`;
    }

    window.onload = ()=>{
        createCircleSpeaker();
        loadAllList();
        initVolumeClick();
        document.getElementById('playBtn').onclick = togglePlay;
        document.getElementById('nextBtn').onclick = next;
    };
</script>
</body>
</html>
