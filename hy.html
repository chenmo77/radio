<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellYell电台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 主容器 - 移动端适配 */
        .player-container {
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1.1;
            background: #d6d6d6;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部液晶屏幕 - 半透明玻璃 */
        .screen-section {
            height: 38%;
            background: rgba(18, 18, 18, 0.94);
            position: relative;
            padding: 22px 26px;
            display: flex;
            align-items: center;
            gap: 26px;
            border-bottom: 3px solid #bcbcbc;
            z-index: 3;
        }

        /* 歌手封面 */
        .singer-avatar {
            width: 160px;
            height: 160px;
            border-radius: 6px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.25);
            z-index: 4;
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.5);
        }

        /* 歌曲信息 */
        .music-info {
            flex: 1;
            color: #ffffff;
            z-index: 4;
        }

        /* 歌曲名走马灯 */
        .music-name {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
        }
        .music-name.marquee {
            display: inline-block;
            animation: textScroll 7s linear infinite;
        }
        @keyframes textScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 歌手名 */
        .singer-name {
            font-size: 17px;
            opacity: 0.85;
            margin-bottom: 22px;
        }

        /* 进度条 */
        .progress-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #ffffff;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 底部控制区 */
        .control-section {
            height: 62%;
            display: flex;
            padding: 32px 36px;
            gap: 28px;
            position: relative;
            z-index: 2;
        }

        /* 喇叭网格 */
        .speaker-area {
            width: 50%;
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            grid-template-rows: repeat(16, 1fr);
            gap: 3.2px;
            align-content: center;
        }
        .speaker-hole {
            width: 100%;
            aspect-ratio: 1/1;
            background: #141414;
            border-radius: 50%;
        }

        /* 右侧控制 */
        .btn-area {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 42px;
        }

        /* 音量旋钮 */
        .volume-box {
            position: relative;
            width: 115px;
            height: 115px;
        }
        .volume-knob {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #cacaca, #a8a8a8);
            border-radius: 50%;
            position: relative;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .volume-knob::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 2.5px;
            height: 24px;
            background: #555;
        }
        .vol-label {
            position: absolute;
            font-size: 16px;
            color: #444;
            font-weight: bold;
        }
        .vol-minus { bottom: -28px; left: -10px; }
        .vol-plus { bottom: -28px; right: -10px; }

        /* 播放按钮 */
        .play-btns {
            display: flex;
            align-items: center;
            gap: 35px;
        }
        .ctrl-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            color: #444;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .ctrl-btn:hover {
            transform: scale(1.15);
            color: #111;
        }
        .play-btn { font-size: 38px; }

        /* ====================================== */
        /* 黑胶唱片 - 完美一半在机内一半在外 */
        /* ====================================== */
        .vinyl {
            position: absolute;
            right: -210px;
            top: 20%;
            width: 410px;
            height: 410px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
            box-shadow: inset 0 0 70px rgba(255,255,255,0.12);
            transition: right 0.9s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }
        /* 播放旋转 */
        .vinyl.spin {
            animation: rotate 9s linear infinite;
        }
        /* 播放光效 */
        .vinyl.glow {
            box-shadow: 
                inset 0 0 70px rgba(255,255,255,0.18),
                0 0 45px rgba(255,255,255,0.28);
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .vinyl-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            text-align: center;
        }
        .vinyl-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #111;
        }
    </style>
</head>
<body>

<div class="player-container">
    <!-- 顶部屏幕 -->
    <div class="screen-section">
        <img id="singerAvatar" class="singer-avatar" src="" alt="歌手头像">
        <div class="music-info">
            <div id="musicName" class="music-name"></div>
            <div id="singerName" class="singer-name"></div>
            <div class="progress-wrap">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- 底部控制 -->
    <div class="control-section">
        <div class="speaker-area">
            <script>for(let i=0;i<288;i++) document.write('<div class="speaker-hole"></div>')</script>
        </div>
        <div class="btn-area">
            <div class="volume-box">
                <div id="volumeKnob" class="volume-knob"></div>
                <div class="vol-label vol-minus">−</div>
                <div class="vol-label vol-plus">+</div>
            </div>
            <div class="play-btns">
                <button id="prevBtn" class="ctrl-btn">⏮</button>
                <button id="playBtn" class="ctrl-btn play-btn">▶</button>
                <button id="nextBtn" class="ctrl-btn">⏭</button>
            </div>
        </div>
    </div>

    <!-- 黑胶唱片 -->
    <div id="vinyl" class="vinyl">
        <div class="vinyl-label">HellYell</div>
        <div class="vinyl-center"></div>
    </div>
</div>

<script>
    let audio = new Audio();
    let playlist = [];
    let currentIndex = 0;
    let isPlay = false;
    let volume = 0.65;
    const vinyl = document.getElementById('vinyl');
    const avatar = document.getElementById('singerAvatar');

    // ======================================
    // 网易云真实歌手头像
    // ======================================
    async function getSingerAvatar(singerName) {
        try {
            const res = await fetch(`https://music.163.com/api/search/pc?s=${encodeURIComponent(singerName)}&type=100`);
            const data = await res.json();
            if (data.result?.artists?.length) return data.result.artists[0].picUrl;
        } catch (e) {}
        return 'https://picsum.photos/seed/'+singerName+'/170/170';
    }

    // ======================================
    // 加载你的两个真实JSON + 音频URL
    // ======================================
    async function loadAllList() {
        try {
            const [hj, qc] = await Promise.all([
                fetch('https://radio.hellyell.com/huaijiu-musiclist.json').then(r=>r.json()),
                fetch('https://radio.hellyell.com/qiche-musiclist.json').then(r=>r.json())
            ]);
            playlist = [...hj, ...qc];
            shuffleList();
            loadMusic(0);
        } catch (e) {
            console.error('歌单加载失败');
            playlist = [{name:'测试 - 测试歌曲', url:'https://music.163.com/song/media/outer/url?id=1916319449.mp3'}];
            loadMusic(0);
        }
    }

    // 随机歌单
    function shuffleList() {
        for(let i=playlist.length-1;i>0;i--){
            const j = Math.floor(Math.random()*(i+1));
            [playlist[i],playlist[j]] = [playlist[j],playlist[i]];
        }
    }

    // ======================================
    // 加载歌曲 + 黑胶完美动画
    // ======================================
    async function loadMusic(index) {
        if(!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const item = playlist[currentIndex];
        
        // 解析歌手歌曲
        const [singer, music] = item.name.split(' - ');
        document.getElementById('singerName').innerText = singer;
        document.getElementById('musicName').innerText = music;

        // 歌曲名滚动
        const nameEl = document.getElementById('musicName');
        nameEl.classList.remove('marquee');
        setTimeout(()=>{
            if(nameEl.scrollWidth > nameEl.offsetWidth) nameEl.classList.add('marquee');
        },100);

        // 歌手头像
        avatar.src = await getSingerAvatar(singer);

        // 黑胶出仓 → 进仓（一半在机内）
        vinyl.style.right = '-210px';
        setTimeout(()=>{
            vinyl.style.right = '-105px';
            vinyl.classList.add('spin','glow');
        }, 450);

        // 加载JSON里的真实音频URL
        audio.src = item.url || 'https://music.163.com/song/media/outer/url?id=1916319449.mp3';
        audio.volume = volume;
        audio.load();
    }

    // ======================================
    // 播放控制
    // ======================================
    function togglePlay() {
        if(isPlay){
            audio.pause();
            vinyl.classList.remove('spin');
            document.getElementById('playBtn').innerText = '▶';
        }else{
            audio.play();
            vinyl.classList.add('spin');
            document.getElementById('playBtn').innerText = '⏸';
        }
        isPlay = !isPlay;
    }

    function prev(){ loadMusic(currentIndex-1); autoPlay(); }
    function next(){ loadMusic(currentIndex+1); autoPlay(); }
    function autoPlay(){ if(isPlay) setTimeout(()=>audio.play(), 900); }

    // ======================================
    // 音量旋钮
    // ======================================
    function initVolume(){
        const knob = document.getElementById('volumeKnob');
        let drag = false;
        knob.onmousedown = ()=> drag=true;
        document.onmouseup = ()=> drag=false;
        document.onmousemove = (e)=>{
            if(!drag) return;
            const rect = knob.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width/2;
            const y = e.clientY - rect.top - rect.height/2;
            let deg = Math.atan2(y,x) * 180 / Math.PI;
            if(deg < -90) deg = 360+deg;
            const v = Math.min(1, Math.max(0, (deg+90)/270));
            volume = v;
            audio.volume = v;
            knob.style.transform = `rotate(${deg}deg)`;
        };
    }

    // 进度条
    audio.ontimeupdate = ()=>{
        const p = (audio.currentTime/audio.duration)*100;
        document.getElementById('progressBar').style.width = p+'%';
    };
    audio.onended = ()=> next();

    // 初始化
    window.onload = ()=>{
        loadAllList();
        initVolume();
        document.getElementById('playBtn').onclick = togglePlay;
        document.getElementById('prevBtn').onclick = prev;
        document.getElementById('nextBtn').onclick = next;
    };
</script>

</body>
</html>
