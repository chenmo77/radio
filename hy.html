<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellYell电台 · 红白机版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 全局统一：小米黑体 Bold */
            font-family: "MiSans", "小米兰亭", "Microsoft YaHei", sans-serif;
            font-weight: 700;
        }

        body {
            background-color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 主容器 */
        .player-container {
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1.1;
            background: #ffffff; /* 底部改成白色 —— 红白机风格 */
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部屏幕 —— 纯红色 红白机风格 */
        .screen-section {
            height: 38%;
            background: #E60012; /* 任天堂红白机经典红 */
            position: relative;
            padding: 22px 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-bottom: 3px solid #bcbcbc;
            z-index: 3;
        }

        /* 歌曲信息 */
        .music-info {
            width: 100%;
            color: #ffffff;
            text-align: left;
        }

        /* NOW PLAYING 小字 - 固定占位 + 统一小米粗体 + 发光闪烁 */
        .now-playing {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 0 6px rgba(255,255,255,0.4);
            margin-bottom: 4px;
            text-align: left;
            visibility: hidden; /* 隐藏但占位，不跳动 */
            animation: glowPulse 1.8s ease-in-out infinite;
        }
        .now-playing.show {
            visibility: visible;
        }
        /* 柔和发光闪烁动画 */
        @keyframes glowPulse {
            0% { opacity: 0.6; text-shadow: 0 0 4px rgba(255,255,255,0.3); }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.7); }
            100% { opacity: 0.6; text-shadow: 0 0 4px rgba(255,255,255,0.3); }
        }

        /* 歌曲名：带左右内边距，和进度条对齐 */
        .music-name {
            font-size: 30px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-align: left;
            padding: 0 1px; /* 左右留白，和进度条对齐 */
        }
        .music-name.marquee {
            display: inline-block;
            animation: textScroll 7s linear infinite;
            padding-left: 2px;
            padding-right: 100%;
        }
        @keyframes textScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 歌手名：加大底部间距 */
        .singer-name {
            font-size: 16px;
            opacity: 0.85;
            margin-bottom: 22px; /* 从14px → 22px，拉开与进度条距离 */
            text-align: left;
        }

        /* 时间 + 进度条 容器 */
        .time-progress {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        /* 时间显示行：放在进度条下方，左右对齐 + 统一字体 */
        .time-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255,255,255,0.65);
        }
        /* 进度条：100%宽度 + 滑块 */
        .progress-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            overflow: visible;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: #ffffff;
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
            position: relative;
        }
        /* 进度滑块 - 仅移动，不跳跃 */
        .progress-thumb {
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* 底部控制区 */
        .control-section {
            height: 62%;
            padding: 32px 36px;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* 整体靠右，实现居中布局 */
            position: relative;
            z-index: 2;
            gap: 28px;
        }

        /* 圆形喇叭区域：缩小50% + 单独往左微调，右侧不动 */
        .speaker-area {
            width: 50%;
            aspect-ratio: 1/1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8%; /* 往左微调，只动喇叭，不动右侧 */
        }
        /* 圆形喇叭孔：标准大小 + 环形排列 */
        .speaker-hole {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #141414;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* 右侧控制：完全不动，保持原位 */
        .btn-area {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        /* 音量旋钮 + 点击加减 */
        .volume-box {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .volume-knob {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ffffff, #e0e0e0); /* 白色旋钮更贴合 */
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .volume-knob::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 2.5px;
            height: 20px;
            background: #555;
        }
        .vol-label {
            position: absolute;
            font-size: 18px;
            color: #444;
            cursor: pointer;
            user-select: none;
        }
        .vol-minus { bottom: -24px; left: 16px; }
        .vol-plus { bottom: -24px; right: 16px; }

        /* 播放按钮 */
        .play-btns {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .ctrl-btn {
            background: transparent;
            border: none;
            font-size: 26px;
            color: #444;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .ctrl-btn:hover {
            transform: scale(1.15);
            color: #111;
        }
        .play-btn { font-size: 36px; }
    </style>
</head>
<body>

<div class="player-container">
    <!-- 顶部屏幕 -->
    <div class="screen-section">
        <div class="music-info">
            <!-- NOW PLAYING：固定占位不跳动 + 发光闪烁 -->
            <div id="nowPlaying" class="now-playing">NOW PLAYING</div>
            <!-- 歌曲名 + 歌手名 -->
            <div id="musicName" class="music-name"></div>
            <div id="singerName" class="singer-name"></div>
        </div>

        <!-- 时间 + 进度条 -->
        <div class="time-progress">
            <div class="progress-wrap">
                <div id="progressBar" class="progress-bar">
                    <div id="progressThumb" class="progress-thumb"></div>
                </div>
            </div>
            <!-- 时间放在进度条下方 -->
            <div class="time-row">
                <div id="currentTime">00:00</div>
                <div id="durationTime">00:00</div>
            </div>
        </div>
    </div>

    <!-- 底部控制 -->
    <div class="control-section">
        <!-- 圆形喇叭：单独往左微调 -->
        <div class="speaker-area" id="speakerArea"></div>

        <!-- 右侧控制：完全不动，保持原位 -->
        <div class="btn-area">
            <div class="volume-box">
                <div id="volumeKnob" class="volume-knob"></div>
                <div class="vol-label vol-minus" id="volMinus">−</div>
                <div class="vol-label vol-plus" id="volPlus">+</div>
            </div>
            <div class="play-btns">
                <button id="prevBtn" class="ctrl-btn">⏮</button>
                <button id="playBtn" class="ctrl-btn play-btn">▶</button>
                <button id="nextBtn" class="ctrl-btn">⏭</button>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = new Audio();
    let playlist = [];
    let currentIndex = 0;
    let isPlay = false;
    let volume = 0.5;

    // ======================================
    // 生成圆形喇叭孔（整体缩小50%）
    // ======================================
    function createCircleSpeaker() {
        const container = document.getElementById('speakerArea');
        const rings = 5;
        const holesPerRing = [12, 18, 24, 30, 36];
        
        for (let r = 0; r < rings; r++) {
            const radius = 15 + r * 12;
            const count = holesPerRing[r];
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);
                
                const dot = document.createElement('div');
                dot.className = 'speaker-hole';
                dot.style.left = x + '%';
                dot.style.top = y + '%';
                container.appendChild(dot);
            }
        }
    }

    // ======================================
    // 加载歌单
    // ======================================
    async function loadAllList() {
        try {
            const [hj, qc] = await Promise.all([
                fetch('https://radio.hellyell.com/huaijiu-musiclist.json').then(r=>r.json()),
                fetch('https://radio.hellyell.com/qiche-musiclist.json').then(r=>r.json())
            ]);
            playlist = [...hj, ...qc];
            shuffleList();
            loadMusic(0);
        } catch (e) {
            console.error('歌单加载失败');
            playlist = [{name:'测试歌手 - 测试歌曲', url:'https://music.163.com/song/media/outer/url?id=1916319449.mp3'}];
            loadMusic(0);
        }
    }

    // 随机歌单
    function shuffleList() {
        for(let i=playlist.length-1;i>0;i--){
            const j = Math.floor(Math.random()*(i+1));
            [playlist[i],playlist[j]] = [playlist[j],playlist[i]];
        }
    }

    // 格式化时间
    function formatTime(t) {
        const m = Math.floor(t / 60).toString().padStart(2, '0');
        const s = Math.floor(t % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    // ======================================
    // 加载歌曲 + 失败自动切歌
    // ======================================
    function loadMusic(index) {
        if(!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const item = playlist[currentIndex];
        
        const [singer, music] = item.name.split(' - ');
        document.getElementById('singerName').innerText = singer;
        document.getElementById('musicName').innerText = music;

        // 重置UI
        document.getElementById('nowPlaying').classList.remove('show');
        document.getElementById('currentTime').innerText = '00:00';
        document.getElementById('durationTime').innerText = '00:00';

        // 歌曲名滚动 + 左右留白不贴边
        const nameEl = document.getElementById('musicName');
        nameEl.classList.remove('marquee');
        setTimeout(()=>{
            if(nameEl.scrollWidth > nameEl.offsetWidth) nameEl.classList.add('marquee');
        },100);

        audio.src = item.url;
        audio.volume = volume;
        audio.load();
    }

    // ======================================
    // 播放控制
    // ======================================
    function togglePlay() {
        if(isPlay){
            audio.pause();
            document.getElementById('playBtn').innerText = '▶';
            document.getElementById('nowPlaying').classList.remove('show');
        }else{
            audio.play();
            document.getElementById('playBtn').innerText = '⏸';
            document.getElementById('nowPlaying').classList.add('show');
        }
        isPlay = !isPlay;
    }

    function prev(){ loadMusic(currentIndex-1); autoPlay(); }
    function next(){ loadMusic(currentIndex+1); autoPlay(); }
    
    // 自动播放
    function autoPlay(){
        if(isPlay) {
            setTimeout(()=>{
                audio.play();
                document.getElementById('nowPlaying').classList.add('show');
            }, 500);
        }
    }

    // ======================================
    // 音频加载失败 → 自动切下一首
    // ======================================
    audio.onerror = () => {
        console.warn('歌曲加载失败，自动切换下一首');
        let attempts = 0;
        const tryNext = () => {
            next();
            attempts++;
            if (attempts >= 10) {
                console.error('连续10首加载失败，停止尝试');
                isPlay = false;
                document.getElementById('playBtn').innerText = '▶';
                document.getElementById('nowPlaying').classList.remove('show');
            }
        };
        tryNext();
    };

    // 进度条 + 滑块移动（无跳跃）
    audio.ontimeupdate = ()=>{
        if(!audio.duration) return;
        const p = (audio.currentTime/audio.duration)*100;
        document.getElementById('progressBar').style.width = p+'%';
        document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
        document.getElementById('durationTime').innerText = formatTime(audio.duration);
    };

    // 歌曲结束切歌
    audio.onended = ()=> {
        next();
    };

    // 音量控制
    function initVolumeClick() {
        const volMinus = document.getElementById('volMinus');
        const volPlus = document.getElementById('volPlus');
        const knob = document.getElementById('volumeKnob');
        
        volMinus.onclick = () => {
            volume = Math.max(0, (Math.round(volume * 10) / 10) - 0.1);
            audio.volume = volume;
            knob.style.transform = `rotate(${(-90 + volume * 270)}deg)`;
        };
        volPlus.onclick = () => {
            volume = Math.min(1, (Math.round(volume * 10) / 10) + 0.1);
            audio.volume = volume;
            knob.style.transform = `rotate(${(-90 + volume * 270)}deg)`;
        };
        knob.style.transform = `rotate(${(-90 + volume * 270)}deg)`;
    }

    // 初始化
    window.onload = ()=>{
        createCircleSpeaker();
        loadAllList();
        initVolumeClick();
        document.getElementById('playBtn').onclick = togglePlay;
        document.getElementById('prevBtn').onclick = prev;
        document.getElementById('nextBtn').onclick = next;
    };
</script>

</body>
</html>
