<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HellYell电台 - 让美好发声</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 90px); /* 减去底部播放器高度 */
        }
        
        /* 左侧导航 */
        .sidebar {
            width: 160px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            padding: 20px 0;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            height: 100%;
        }
        
        .logo {
            padding: 0 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 5;
        }
        
        .logo h1 {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .nav-section {
            padding: 0 15px;
            margin-bottom: 25px;
        }
        
        .nav-section h3 {
            font-size: 16px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .nav-list {
            list-style: none;
        }
        
        .nav-item {
            display: block;
            padding: 10px 12px;
            color: #ccc;
            text-decoration: none;
            font-size: 16px;
            border-radius: 6px;
            margin-bottom: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .nav-item:hover {
            background: #2a2a2a;
            color: #fff;
        }
        
        .nav-item.active {
            background: #d32f2f;
            color: #fff;
        }
        
        /* 右侧内容区域 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #0f0f0f;
            height: 100%;
        }
        
        .content-section {
            margin-bottom: 35px;
            min-height: 100%;
        }
        
        .content-section h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 18px;
            color: #fff;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
        }
        
        /* 电台列表（普通分类） */
        .station-list {
            display: grid;
            gap: 10px;
        }
        
        .station-item {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 15px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .station-item:hover {
            background: #2a2a2a;
            border-color: #d32f2f;
        }
        
        .station-item.active {
            background: #d32f2f;
            border-color: #d32f2f;
        }
        
        .station-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .station-name {
            font-size: 16px;
            color: #fff;
            flex: 1;
        }
        
        .live-badge {
            background: #d32f2f;
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-left: 10px;
        }
        
        /* 电台播放器样式（怀旧电台和汽车电台专用） */
        .radio-player-container {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #2a2a2a;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100% - 60px);
            min-height: 500px;
        }
        
        .current-song-display {
            text-align: center;
            margin-bottom: 20px;
            padding: 30px 20px;
            background: linear-gradient(145deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 10px;
            border: 1px solid #3a3a3a;
        }
        
        .current-song-title {
            font-size: 32px;
            font-weight: 600;
            color: #d32f2f;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(211, 47, 47, 0.3);
            word-break: break-word;
        }
        
        .current-song-subtitle {
            font-size: 18px;
            color: #999;
        }
        
        /* 播放模式按钮组 */
        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 30px;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #ccc;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 90px;
        }
        
        .mode-btn:hover {
            background: #3a3a3a;
            border-color: #d32f2f;
        }
        
        .mode-btn.active {
            background: #d32f2f;
            border-color: #d32f2f;
            color: #fff;
        }
        
        /* 移除导航按钮 */
        .song-navigation {
            display: none;
        }
        
        .song-list-scroll {
            flex: 1;
            max-height: none;
            overflow-y: auto;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #0f0f0f;
            padding: 10px;
            margin-top: 10px;
        }
        
        .song-list-item {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 6px;
        }
        
        .song-list-item:last-child {
            border-bottom: none;
        }
        
        .song-list-item:hover {
            background: #2a2a2a;
        }
        
        .song-list-item.active {
            background: #d32f2f;
        }
        
        .song-list-item.active .song-list-name {
            color: #fff;
        }
        
        .song-list-name {
            font-size: 16px;
            color: #ccc;
        }
        
        /* 底部播放器 */
        .player {
            height: 90px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            z-index: 100;
            flex-shrink: 0;
        }
        
        .player-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }
        
        .current-station {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .current-song {
            font-size: 14px;
            color: #ccc;
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-time {
            font-size: 14px;
            color: #666;
            margin-top: 6px;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .play-btn {
            background: #d32f2f;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 20px;
            position: relative;
            flex-shrink: 0;
        }
        
        .play-btn:hover {
            background: #b71c1c;
        }
        
        .play-btn::before {
            content: "▶";
            position: absolute;
        }
        
        .play-btn.paused::before {
            content: "■";
            letter-spacing: -3px;
            font-weight: bold;
        }
        
        .progress-container {
            flex: 1;
            max-width: 400px;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2a2a2a;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .progress {
            width: 30%;
            height: 100%;
            background: #d32f2f;
            border-radius: 3px;
            transition: width 0.1s ease;
        }
        
        /* 滚动条样式 */
        .sidebar::-webkit-scrollbar,
        .main-content::-webkit-scrollbar,
        .song-list-scroll::-webkit-scrollbar {
            width: 6px;
        }
        
        .sidebar::-webkit-scrollbar-track,
        .main-content::-webkit-scrollbar-track,
        .song-list-scroll::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        .sidebar::-webkit-scrollbar-thumb,
        .main-content::-webkit-scrollbar-thumb,
        .song-list-scroll::-webkit-scrollbar-thumb {
            background: #d32f2f;
            border-radius: 3px;
        }
        
        .sidebar::-webkit-scrollbar-thumb:hover,
        .main-content::-webkit-scrollbar-thumb:hover,
        .song-list-scroll::-webkit-scrollbar-thumb:hover {
            background: #b71c1c;
        }
        
        /* 手机端适配 */
        @media (max-width: 768px) {
            .container {
                height: calc(100vh - 85px);
            }
            
            .sidebar {
                width: 140px;
                padding: 15px 0;
            }
            
            .logo {
                padding: 0 12px 15px;
            }
            
            .logo h1 {
                font-size: 18px;
            }
            
            .nav-section {
                padding: 0 12px;
                margin-bottom: 20px;
            }
            
            .nav-section h3 {
                font-size: 15px;
            }
            
            .nav-item {
                padding: 8px 10px;
                font-size: 15px;
            }
            
            .main-content {
                padding: 15px;
            }
            
            .content-section h2 {
                font-size: 18px;
            }
            
            .station-item {
                padding: 12px 15px;
            }
            
            .station-name {
                font-size: 15px;
            }
            
            .live-badge {
                font-size: 12px;
                padding: 3px 8px;
            }
            
            .radio-player-container {
                padding: 20px;
                min-height: 400px;
            }
            
            .current-song-title {
                font-size: 28px;
            }
            
            .current-song-subtitle {
                font-size: 16px;
            }
            
            .mode-buttons {
                gap: 10px;
            }
            
            .mode-btn {
                padding: 8px 15px;
                font-size: 13px;
                min-width: 80px;
            }
            
            .player {
                height: 85px;
                padding: 0 15px;
                gap: 15px;
            }
            
            .current-station {
                font-size: 15px;
            }
            
            .current-song {
                font-size: 13px;
            }
            
            .player-time {
                font-size: 13px;
            }
            
            .play-btn {
                width: 55px;
                height: 55px;
                font-size: 18px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                height: calc(100vh - 80px);
            }
            
            .sidebar {
                width: 130px;
            }
            
            .logo h1 {
                font-size: 17px;
            }
            
            .nav-section h3 {
                font-size: 14px;
            }
            
            .nav-item {
                font-size: 14px;
                padding: 7px 9px;
            }
            
            .station-name {
                font-size: 14px;
            }
            
            .live-badge {
                font-size: 11px;
                padding: 2px 7px;
            }
            
            .radio-player-container {
                padding: 15px;
                min-height: 350px;
            }
            
            .current-song-title {
                font-size: 24px;
            }
            
            .current-song-subtitle {
                font-size: 14px;
            }
            
            .mode-buttons {
                flex-wrap: wrap;
            }
            
            .mode-btn {
                padding: 6px 12px;
                font-size: 12px;
                min-width: 70px;
            }
            
            .player {
                height: 80px;
                padding: 0 12px;
            }
            
            .play-btn {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }
            
            .current-station {
                font-size: 14px;
            }
            
            .current-song {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧导航 -->
        <div class="sidebar">
            <div class="logo">
                <h1>HellYell电台</h1>
            </div>
            
            <div class="nav-section">
                <ul class="nav-list">
                    <li><a class="nav-item active" data-target="foreign-music">国际音乐台</a></li>
                    <li><a class="nav-item" data-target="chinese-music">中文音乐台</a></li>
                    <li><a class="nav-item" data-target="news-comprehensive">新闻综合台</a></li>
                    <li><a class="nav-item" data-target="huaijiu-radio">怀旧电台</a></li>
                    <li><a class="nav-item" data-target="qiche-radio">汽车电台</a></li>
                </ul>
            </div>
        </div>

        <!-- 右侧内容区域 -->
        <div class="main-content">
            <!-- 外文音乐台 -->
            <div class="content-section" id="foreign-music">
                <h2>国际音乐台</h2>
                <div class="station-list" id="foreign-music-list">
                    <!-- 内容将通过JavaScript动态加载 -->
                </div>
            </div>
            <!-- 中文音乐台 -->
            <div class="content-section" id="chinese-music">
                <h2>中文音乐台</h2>
                <div class="station-list" id="chinese-music-list">
                    <!-- 内容将通过JavaScript动态加载 -->
                </div>
            </div>
            <!-- 新闻综合台 -->
            <div class="content-section" id="news-comprehensive">
                <h2>新闻综合台</h2>
                <div class="station-list" id="news-comprehensive-list">
                    <!-- 内容将通过JavaScript动态加载 -->
                </div>
            </div>
            <!-- 怀旧电台 - 特殊播放器 -->
            <div class="content-section" id="huaijiu-radio" style="display: none;">
                <h2>怀旧电台</h2>
                <div class="radio-player-container" id="huaijiu-player">
                    <!-- 将通过JavaScript动态加载播放器内容 -->
                </div>
            </div>
            <!-- 汽车电台 - 特殊播放器 -->
            <div class="content-section" id="qiche-radio" style="display: none;">
                <h2>汽车电台</h2>
                <div class="radio-player-container" id="qiche-player">
                    <!-- 将通过JavaScript动态加载播放器内容 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 底部播放器 -->
    <div class="player">
        <div class="player-info">
            <div class="current-station">未选择电台</div>
            <div class="current-song">请选择电台开始播放</div>
            <div class="player-time">00:00</div>
        </div>
        <div class="player-controls">
            <button class="play-btn"></button>
        </div>
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>
    </div>

    <script>
        // 电台数据加载器
        class StationDataLoader {
            constructor() {
                this.stationLists = {};
                this.radioSongs = {};
            }
            
            async loadStationData(sectionId, dataFile) {
                try {
                    const response = await fetch(dataFile);
                    const data = await response.json();
                    
                    // 如果是电台分类（怀旧或汽车），存储为歌曲列表
                    if (sectionId === 'huaijiu-radio' || sectionId === 'qiche-radio') {
                        this.radioSongs[sectionId] = data;
                        this.renderRadioPlayer(sectionId, data);
                    } else {
                        this.stationLists[sectionId] = data;
                        this.renderStationList(sectionId, data);
                    }
                } catch (error) {
                    console.error(`加载 ${sectionId} 数据失败:`, error);
                }
            }
            
            renderStationList(sectionId, stations) {
                const container = document.getElementById(`${sectionId}-list`);
                if (!container) return;
                
                container.innerHTML = stations.map(station => `
                    <div class="station-item" data-url="${station.url}">
                        <div class="station-info">
                            <span class="station-name">${station.name}</span>
                            ${station.recommended ? '<span class="live-badge">推荐</span>' : ''}
                            ${station.tag ? `<span class="live-badge">${station.tag}</span>` : ''}
                        </div>
                    </div>
                `).join('');
            }
            
            renderRadioPlayer(sectionId, songs) {
                const container = document.getElementById(sectionId === 'huaijiu-radio' ? 'huaijiu-player' : 'qiche-player');
                if (!container || !songs || songs.length === 0) return;
                
                // 获取电台名称
                const radioName = sectionId === 'huaijiu-radio' ? '怀旧电台' : '汽车电台';
                
                container.innerHTML = `
                    <div class="current-song-display">
                        <div class="current-song-title">${songs[0].name}</div>
                        <div class="current-song-subtitle">${radioName}</div>
                    </div>
                    
                    <div class="mode-buttons">
                        <button class="mode-btn active" data-mode="random">随机循环</button>
                        <button class="mode-btn" data-mode="sequential">顺序播放</button>
                        <button class="mode-btn" data-mode="single">单曲循环</button>
                        <button class="mode-btn" data-mode="list">列表循环</button>
                    </div>
                    
                    <div class="song-list-scroll" id="song-scroll-list">
                        ${songs.map((song, index) => `
                            <div class="song-list-item ${index === 0 ? 'active' : ''}" data-index="${index}">
                                <div class="song-list-name">${song.name}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            async loadAllData() {
                await Promise.all([
                    this.loadStationData('foreign-music', 'foreign-music.json'),
                    this.loadStationData('chinese-music', 'chinese-music.json'),
                    this.loadStationData('news-comprehensive', 'news-comprehensive.json'),
                    this.loadStationData('huaijiu-radio', 'huaijiu-musiclist.json'),
                    this.loadStationData('qiche-radio', 'qiche-musiclist.json')
                ]);
            }
        }

        class RadioPlayer {
            constructor() {
                this.audio = new Audio();
                this.isPlaying = false;
                this.currentStation = null;
                this.currentRadioType = null; // 'huaijiu' 或 'qiche'
                this.currentSongIndex = 0;
                this.songs = [];
                this.volume = 0.5;
                this.dataLoader = new StationDataLoader();
                this.loadTimeout = null;
                this.playMode = 'random'; // 'random', 'sequential', 'single', 'list'
                this.scrollTimeout = null;
                this.isUserScrolling = false;
                
                this.init();
            }
            
            async init() {
                await this.dataLoader.loadAllData();
                this.setupEventListeners();
                this.setupNavigation();
                this.setupVolume();
                this.setupRadioControls();
                
                // 默认显示国际音乐台
                document.getElementById('foreign-music').style.display = 'block';
            }
            
            setupEventListeners() {
                // 电台点击事件 - 使用事件委托
                document.addEventListener('click', (e) => {
                    const stationItem = e.target.closest('.station-item');
                    if (stationItem) {
                        this.selectStation(stationItem);
                    }
                });
                
                // 播放按钮
                document.querySelector('.play-btn').addEventListener('click', () => {
                    this.togglePlay();
                });
                
                // 音频事件
                this.audio.addEventListener('loadstart', () => {
                    this.updateStatus('正在加载...');
                });
                
                this.audio.addEventListener('canplay', () => {
                    this.updateStatus('可以播放');
                });
                
                this.audio.addEventListener('playing', () => {
                    this.updateStatus('播放中');
                    this.updatePlayButton(true);
                });
                
                this.audio.addEventListener('pause', () => {
                    this.updatePlayButton(false);
                });
                
                this.audio.addEventListener('ended', () => {
                    // 歌曲结束，根据播放模式处理
                    this.handleSongEnd();
                });
                
                this.audio.addEventListener('error', (e) => {
                    console.error('播放错误:', e);
                    this.updateStatus('播放失败，尝试下一首');
                    
                    // 播放失败时尝试下一首
                    if (this.currentRadioType) {
                        setTimeout(() => {
                            this.handleSongEnd();
                        }, 1000);
                    }
                });
                
                this.audio.addEventListener('timeupdate', () => {
                    this.updateTime();
                });
            }
            
            setupNavigation() {
                // 分类导航点击事件
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        
                        // 更新活跃状态
                        document.querySelectorAll('.nav-item').forEach(nav => {
                            nav.classList.remove('active');
                        });
                        item.classList.add('active');
                        
                        // 获取目标分类
                        const targetId = item.getAttribute('data-target');
                        
                        // 隐藏所有内容区域
                        document.querySelectorAll('.content-section').forEach(section => {
                            section.style.display = 'none';
                        });
                        
                        // 显示目标区域
                        const targetSection = document.getElementById(targetId);
                        if (targetSection) {
                            targetSection.style.display = 'block';
                            
                            // 如果是电台分类（怀旧或汽车），初始化电台播放
                            if (targetId === 'huaijiu-radio') {
                                this.initRadioPlay('huaijiu');
                            } else if (targetId === 'qiche-radio') {
                                this.initRadioPlay('qiche');
                            } else {
                                // 普通电台分类
                                this.currentRadioType = null;
                            }
                        }
                    });
                });
            }
            
            setupRadioControls() {
                // 模式按钮点击事件
                document.addEventListener('click', (e) => {
                    const modeBtn = e.target.closest('.mode-btn');
                    if (modeBtn && this.currentRadioType) {
                        e.stopPropagation();
                        
                        // 更新按钮状态
                        document.querySelectorAll('.mode-btn').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        modeBtn.classList.add('active');
                        
                        // 设置播放模式
                        this.playMode = modeBtn.dataset.mode;
                    }
                });
                
                // 歌曲列表点击事件
                document.addEventListener('click', (e) => {
                    const songItem = e.target.closest('.song-list-item');
                    if (songItem && this.currentRadioType) {
                        e.stopPropagation();
                        const index = parseInt(songItem.dataset.index);
                        if (!isNaN(index)) {
                            this.playSongAtIndex(index);
                        }
                    }
                });
                
                // 滚动列表自动播放 - 立即切换
                const scrollHandler = () => {
                    if (!this.currentRadioType) return;
                    
                    const scrollList = document.getElementById('song-scroll-list');
                    if (!scrollList) return;
                    
                    const items = scrollList.querySelectorAll('.song-list-item');
                    if (items.length === 0) return;
                    
                    // 获取滚动容器可见区域的中心位置
                    const containerRect = scrollList.getBoundingClientRect();
                    const containerCenter = containerRect.top + containerRect.height / 2;
                    
                    // 找到最接近中心的项
                    let closestItem = null;
                    let closestDistance = Infinity;
                    
                    items.forEach(item => {
                        const rect = item.getBoundingClientRect();
                        const itemCenter = rect.top + rect.height / 2;
                        const distance = Math.abs(itemCenter - containerCenter);
                        
                        if (distance < closestDistance) {
                            closestDistance = distance;
                            closestItem = item;
                        }
                    });
                    
                    if (closestItem) {
                        const index = parseInt(closestItem.dataset.index);
                        if (!isNaN(index) && index !== this.currentSongIndex) {
                            // 清除之前的超时，立即切换
                            clearTimeout(this.scrollTimeout);
                            this.scrollTimeout = setTimeout(() => {
                                this.playSongAtIndex(index);
                            }, 100); // 100ms延迟，避免频繁切换
                        }
                    }
                };
                
                // 监听滚动事件 - 使用节流
                let scrolling = false;
                document.querySelector('.main-content').addEventListener('scroll', () => {
                    if (!scrolling && this.currentRadioType) {
                        window.requestAnimationFrame(() => {
                            scrollHandler();
                            scrolling = false;
                        });
                        scrolling = true;
                    }
                });
                
                // 监听列表内部滚动
                document.addEventListener('scroll', (e) => {
                    if (e.target.id === 'song-scroll-list' && this.currentRadioType) {
                        window.requestAnimationFrame(() => {
                            scrollHandler();
                        });
                    }
                }, true);
            }
            
            setupVolume() {
                this.audio.volume = this.volume;
            }
            
            initRadioPlay(type) {
                this.currentRadioType = type;
                const songs = this.dataLoader.radioSongs[type === 'huaijiu' ? 'huaijiu-radio' : 'qiche-radio'];
                
                if (!songs || songs.length === 0) return;
                
                this.songs = songs;
                
                // 默认设置为随机循环模式
                this.playMode = 'random';
                
                // 更新模式显示
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.mode === 'random') {
                        btn.classList.add('active');
                    }
                });
                
                // 随机选择一首歌开始播放
                this.currentSongIndex = Math.floor(Math.random() * songs.length);
                
                this.updateRadioDisplay();
                this.playCurrentSong();
            }
            
            updateRadioDisplay() {
                if (!this.currentRadioType || !this.songs.length) return;
                
                const container = document.getElementById(this.currentRadioType === 'huaijiu' ? 'huaijiu-player' : 'qiche-player');
                if (!container) return;
                
                const currentSong = this.songs[this.currentSongIndex];
                
                // 更新当前歌曲显示
                const titleElement = container.querySelector('.current-song-title');
                if (titleElement) titleElement.textContent = currentSong.name;
                
                // 更新列表激活状态
                const items = container.querySelectorAll('.song-list-item');
                items.forEach((item, index) => {
                    if (index === this.currentSongIndex) {
                        item.classList.add('active');
                        
                        // 滚动到当前项（如果是用户点击切换的）
                        if (this.isUserScrolling) {
                            item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    } else {
                        item.classList.remove('active');
                    }
                });
                
                // 更新底部播放器信息
                document.querySelector('.current-station').textContent = 
                    this.currentRadioType === 'huaijiu' ? '怀旧电台' : '汽车电台';
                document.querySelector('.current-song').textContent = `正在播放: ${currentSong.name}`;
            }
            
            playCurrentSong() {
                if (!this.songs.length || this.currentSongIndex < 0) return;
                
                const song = this.songs[this.currentSongIndex];
                this.currentStation = {
                    name: song.name,
                    url: song.url,
                    isRadio: true
                };
                
                // 清除之前的超时
                if (this.loadTimeout) {
                    clearTimeout(this.loadTimeout);
                }
                
                this.audio.src = song.url;
                
                // 设置加载超时
                this.loadTimeout = setTimeout(() => {
                    if (!this.isPlaying) {
                        console.log('歌曲加载超时，自动播放下一首');
                        this.handleSongEnd();
                    }
                }, 8000);
                
                this.audio.play()
                    .then(() => {
                        clearTimeout(this.loadTimeout);
                        this.isPlaying = true;
                        this.updatePlayButton(true);
                    })
                    .catch(error => {
                        console.error('播放失败:', error);
                        clearTimeout(this.loadTimeout);
                        
                        // 播放失败，尝试下一首
                        setTimeout(() => {
                            this.handleSongEnd();
                        }, 1000);
                    });
            }
            
            handleSongEnd() {
                if (!this.songs.length) return;
                
                switch (this.playMode) {
                    case 'random':
                        // 随机循环：随机选择下一首
                        let nextIndex;
                        do {
                            nextIndex = Math.floor(Math.random() * this.songs.length);
                        } while (nextIndex === this.currentSongIndex && this.songs.length > 1);
                        this.currentSongIndex = nextIndex;
                        this.updateRadioDisplay();
                        this.playCurrentSong();
                        break;
                        
                    case 'sequential':
                        // 顺序播放：顺序下一首，播完最后一首后停止
                        if (this.currentSongIndex < this.songs.length - 1) {
                            this.currentSongIndex++;
                            this.updateRadioDisplay();
                            this.playCurrentSong();
                        } else {
                            // 最后一首播放完毕，停止播放
                            this.isPlaying = false;
                            this.updatePlayButton(false);
                            document.querySelector('.current-song').textContent = '播放结束';
                        }
                        break;
                        
                    case 'single':
                        // 单曲循环：重复播放当前歌曲
                        this.playCurrentSong();
                        break;
                        
                    case 'list':
                        // 列表循环：顺序下一首，播完最后一首后从头开始
                        this.currentSongIndex = (this.currentSongIndex + 1) % this.songs.length;
                        this.updateRadioDisplay();
                        this.playCurrentSong();
                        break;
                }
            }
            
            playSongAtIndex(index) {
                if (index < 0 || index >= this.songs.length || index === this.currentSongIndex) return;
                
                this.isUserScrolling = true;
                this.currentSongIndex = index;
                this.updateRadioDisplay();
                this.playCurrentSong();
                
                // 重置用户滚动标记
                setTimeout(() => {
                    this.isUserScrolling = false;
                }, 500);
            }
            
            selectStation(stationElement) {
                // 移除之前选中的样式
                document.querySelectorAll('.station-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                // 添加当前选中样式
                stationElement.classList.add('active');
                
                const stationName = stationElement.querySelector('.station-name').textContent;
                const stationUrl = stationElement.dataset.url;
                
                this.currentStation = {
                    name: stationName,
                    url: stationUrl,
                    element: stationElement
                };
                
                this.currentRadioType = null; // 退出电台模式
                
                document.querySelector('.current-station').textContent = stationName;
                document.querySelector('.current-song').textContent = '正在加载...';
                this.updateStatus('已选择电台');
                
                // 自动播放
                this.play();
            }
            
            togglePlay() {
                if (!this.currentStation && !this.currentRadioType) {
                    alert('请先选择一个电台');
                    return;
                }
                
                if (this.isPlaying) {
                    this.pause();
                } else {
                    if (this.currentRadioType) {
                        this.playCurrentSong();
                    } else {
                        this.play();
                    }
                }
            }
            
            play() {
                if (!this.currentStation) return;
                
                if (this.loadTimeout) {
                    clearTimeout(this.loadTimeout);
                }
                
                this.audio.src = this.currentStation.url;
                
                this.loadTimeout = setTimeout(() => {
                    if (!this.isPlaying) {
                        console.log('电台加载超时');
                        this.updateStatus('加载超时');
                    }
                }, 8000);
                
                this.audio.play()
                    .then(() => {
                        clearTimeout(this.loadTimeout);
                        this.isPlaying = true;
                        this.updatePlayButton(true);
                        
                        setTimeout(() => {
                            const songs = ['经典老歌', '流行金曲', '轻音乐', '爵士乐', '新闻播报'];
                            const randomSong = songs[Math.floor(Math.random() * songs.length)];
                            document.querySelector('.current-song').textContent = `正在播放: ${randomSong}`;
                        }, 1000);
                    })
                    .catch(error => {
                        clearTimeout(this.loadTimeout);
                        console.error('播放失败:', error);
                        this.updateStatus('播放失败，请检查网络');
                    });
            }
            
            pause() {
                if (this.loadTimeout) {
                    clearTimeout(this.loadTimeout);
                }
                
                this.audio.pause();
                this.isPlaying = false;
                this.updatePlayButton(false);
                this.updateStatus('已暂停');
                document.querySelector('.current-song').textContent = '播放已暂停';
            }
            
            updatePlayButton(playing) {
                const playBtn = document.querySelector('.play-btn');
                if (playing) {
                    playBtn.classList.add('paused');
                } else {
                    playBtn.classList.remove('paused');
                }
            }
            
            updateStatus(status) {
                console.log('状态:', status);
            }
            
            updateTime() {
                const timeElement = document.querySelector('.player-time');
                const currentTime = this.formatTime(this.audio.currentTime);
                const duration = this.formatTime(this.audio.duration || 0);
                timeElement.textContent = `${currentTime} / ${duration}`;
                
                if (this.audio.duration) {
                    const progress = (this.audio.currentTime / this.audio.duration) * 100;
                    document.querySelector('.progress').style.width = `${progress}%`;
                }
            }
            
            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }

        // 初始化播放器
        document.addEventListener('DOMContentLoaded', () => {
            new RadioPlayer();
        });
    </script>
</body>
</html>
