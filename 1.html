<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HellYell 音乐电台</title>
    <link href="https://fontsapi.zeoseven.com/256/main/result.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: "Huiwen-mincho", 'Arial', 'MiSans', 'Microsoft YaHei', serif;
            transition: background 0.3s ease;
        }

        /* 浅色模式 */
        body.light-mode {
            background: #f5f5f0;
        }
        body.light-mode .song-name {
            color: #cc3333;
        }
        body.light-mode .artist-name {
            color: #000000;
        }
        body.light-mode .ctrl-icon {
            color: #555555;
        }
        body.light-mode .play-icon {
            border-color: transparent transparent transparent #cc3333;
        }
        body.light-mode .pause-icon .bar {
            background: #cc3333;
        }
        body.light-mode .progress-bar-container {
            background: rgba(0,0,0,0.15);
        }
        body.light-mode .progress-fill {
            background: #cc3333;
        }

        /* 深色模式 */
        body.dark-mode {
            background: #1a1a1a;
        }
        body.dark-mode .song-name {
            color: #ff4444;
        }
        body.dark-mode .artist-name {
            color: #ffffff;
        }
        body.dark-mode .ctrl-icon {
            color: #cccccc;
        }
        body.dark-mode .play-icon {
            border-color: transparent transparent transparent #ff4444;
        }
        body.dark-mode .pause-icon .bar {
            background: #ff4444;
        }
        body.dark-mode .progress-bar-container {
            background: rgba(255,255,255,0.2);
        }
        body.dark-mode .progress-fill {
            background: #ff4444;
        }

        /* ========== 横屏布局 (宽 >= 高) ========== */
        @media (min-aspect-ratio: 1/1) {
            body {
                display: flex;
                flex-direction: row;
            }
            
            .song-area {
                position: fixed;
                left: 0;
                top: 0;
                width: 80%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1;
            }
            
            .song-text {
                text-align: center;
                padding: 20px;
            }
            
            .buttons-area {
                position: fixed;
                right: 0;
                top: 0;
                width: 20%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: space-evenly;
                align-items: center;
                z-index: 10;
            }
            
            .ctrl-btn {
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                background: transparent;
                border: none;
                cursor: pointer;
                outline: none;
                padding: 0;
            }
            
            /* 横屏：按钮图标容器大小为屏幕高度的20% */
            .btn-icon-wrapper {
                width: 20vh;
                height: 20vh;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
            }
        }

        /* ========== 竖屏布局 (宽 < 高) ========== */
        @media (max-aspect-ratio: 1/1) {
            body {
                display: flex;
                flex-direction: column;
            }
            
            .song-area {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                height: 80%;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1;
            }
            
            .song-text {
                text-align: center;
                padding: 20px;
                width: 90%;
            }
            
            .buttons-area {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 20%;
                display: flex;
                flex-direction: row;
                justify-content: space-evenly;
                align-items: center;
                z-index: 10;
            }
            
            .ctrl-btn {
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                background: transparent;
                border: none;
                cursor: pointer;
                outline: none;
                padding: 0;
                flex: 1;
            }
            
            /* 竖屏：按钮图标容器大小为屏幕宽度的20% */
            .btn-icon-wrapper {
                width: 20vw;
                height: 20vw;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
            }
        }

        /* 所有图标容器内的内容完全填充，尺寸一致 */
        .ctrl-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
            width: 100%;
            height: 100%;
        }
        
        .ctrl-btn:active .ctrl-icon {
            transform: scale(0.92);
        }
        
        /* 太阳/月亮 SVG 图标 - 完全占满容器 */
        .sun-icon, .moon-icon {
            width: 100%;
            height: 100%;
        }
        .sun-icon svg, .moon-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* 播放三角形 - 相对于容器大小自适应，保持视觉居中，所有三个按钮尺寸一致 */
        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            /* 使用百分比相对于容器，但border不支持百分比，改用vw/vh单位确保一致性 */
            border-width: 0;
            /* 使用相对于视口的单位，但为了在所有设备上保持一致，使用相对于容器大小的方式 */
        }
        
        /* 重新定义：所有图标都使用相对于按钮容器大小的固定比例 */
        .btn-icon-wrapper .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0;
        }
        
        /* 横屏时播放图标大小基于屏幕高度 */
        @media (min-aspect-ratio: 1/1) {
            .play-icon {
                border-width: 6vh 0 6vh 11vh;
                margin-left: 2vh;
            }
            .pause-icon .bar {
                width: 1.2vh;
                height: 10vh;
                border-radius: 0.5vh;
            }
            .pause-icon {
                gap: 2vh;
            }
            .next-icon {
                font-size: 12vh;
            }
            .sun-icon, .moon-icon {
                font-size: 12vh;
            }
        }
        
        /* 竖屏时播放图标大小基于屏幕宽度 */
        @media (max-aspect-ratio: 1/1) {
            .play-icon {
                border-width: 6vw 0 6vw 11vw;
                margin-left: 2vw;
            }
            .pause-icon .bar {
                width: 1.2vw;
                height: 10vw;
                border-radius: 0.5vw;
            }
            .pause-icon {
                gap: 2vw;
            }
            .next-icon {
                font-size: 12vw;
            }
            .sun-icon, .moon-icon {
                font-size: 12vw;
            }
        }
        
        /* 暂停图标样式 */
        .pause-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 下一首图标 - 字体图标 */
        .next-icon {
            line-height: 1;
            font-weight: normal;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 太阳/月亮图标内容居中 */
        .sun-icon, .moon-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== 波纹特效 ========== */
        .wave-ripple-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
        
        .wave-ripple {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(204, 51, 51, 0.6);
            opacity: 0;
            animation: waveExpand 2.2s ease-out infinite;
            pointer-events: none;
            display: none;
            box-sizing: border-box;
        }
        
        .playing-ripple .wave-ripple {
            display: block;
        }
        
        .wave-ripple:nth-child(1) { animation-delay: 0s; }
        .wave-ripple:nth-child(2) { animation-delay: 0.7s; }
        .wave-ripple:nth-child(3) { animation-delay: 1.4s; }
        
        @keyframes waveExpand {
            0% {
                transform: scale(1);
                opacity: 0.7;
                border-width: 2px;
            }
            100% {
                transform: scale(2.2);
                opacity: 0;
                border-width: 1px;
            }
        }
        
        body.dark-mode .wave-ripple {
            border-color: rgba(255, 68, 68, 0.7);
        }
        
        /* ========== 底部进度条 ========== */
        .progress-bar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            cursor: pointer;
            z-index: 100;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            transition: width 0.05s linear;
        }

        /* 渐隐渐显动画 */
        .fade-text {
            transition: opacity 0.35s ease-in-out;
            opacity: 1;
        }
        .fade-text.fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

<!-- 歌曲信息区域 -->
<div class="song-area">
    <div class="song-text">
        <div class="fade-text" id="songNameWrapper">
            <div class="song-name" id="songName">欢迎收听</div>
        </div>
        <div class="fade-text" id="artistNameWrapper">
            <div class="artist-name" id="artistName">HellYell Radio</div>
        </div>
    </div>
</div>

<!-- 按钮区域 - 三个图标按钮尺寸完全一致 -->
<div class="buttons-area" id="buttonsArea">
    <button class="ctrl-btn" id="themeBtn">
        <div class="btn-icon-wrapper">
            <div class="ctrl-icon moon-icon" id="themeIcon">
                <svg viewBox="0 0 100 100" fill="currentColor">
                    <path d="M50,10 A40,40 0 1,0 85,75 A35,35 0 0,1 50,10 Z"/>
                </svg>
            </div>
        </div>
    </button>
    
    <button class="ctrl-btn" id="playBtn">
        <div class="btn-icon-wrapper" id="playIconWrapper">
            <div class="wave-ripple-container">
                <div class="wave-ripple"></div>
                <div class="wave-ripple"></div>
                <div class="wave-ripple"></div>
            </div>
            <span id="playIcon" class="ctrl-icon play-icon"></span>
            <span id="pauseIcon" class="ctrl-icon pause-icon" style="display:none;">
                <span class="bar"></span><span class="bar"></span>
            </span>
        </div>
    </button>
    
    <button class="ctrl-btn" id="nextBtn">
        <div class="btn-icon-wrapper">
            <span class="ctrl-icon next-icon">⏭</span>
        </div>
    </button>
</div>

<!-- 底部进度条 -->
<div class="progress-bar-container" id="progressBarContainer">
    <div class="progress-fill" id="progressFill"></div>
</div>

<script>
    // ========== 音频核心逻辑 ==========
    const audio = new Audio();
    audio.preload = "auto";
    let allSongs = [];
    let currentSong = null;
    let isPlaying = false;
    let normalCount = 0;
    let hasStarted = false;
    let isSwitching = false;
    let loadTimer = null;
    let volume = 1.0;
    const promoSong = { name: "HellYell Radio - 欢迎收听", url: "https://radio.hellyell.com/hy.mp3" };
    const BUFFER_TIMEOUT = 30000;

    // 字体自适应
    function adjustFontSize() {
        const isLandscape = window.innerWidth >= window.innerHeight;
        const songNameEl = document.getElementById('songName');
        const artistNameEl = document.getElementById('artistName');
        
        if (!songNameEl || !artistNameEl) return;
        
        let songFontSize;
        if (isLandscape) {
            songFontSize = window.innerWidth * 0.1;
        } else {
            songFontSize = window.innerHeight * 0.2;
        }
        songFontSize = Math.min(Math.max(songFontSize, 18), 80);
        let artistFontSize = songFontSize - 6;
        artistFontSize = Math.max(artistFontSize, 12);
        
        songNameEl.style.fontSize = songFontSize + 'px';
        artistNameEl.style.fontSize = artistFontSize + 'px';
    }

    // 主题切换
    function setTheme(theme) {
        const themeIcon = document.getElementById('themeIcon');
        if (theme === 'dark') {
            document.body.classList.add('dark-mode');
            document.body.classList.remove('light-mode');
            themeIcon.className = 'ctrl-icon sun-icon';
            themeIcon.innerHTML = `<svg viewBox="0 0 100 100" fill="currentColor">
                <circle cx="50" cy="50" r="22" />
                <line x1="50" y1="8" x2="50" y2="20" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <line x1="50" y1="80" x2="50" y2="92" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <line x1="8" y1="50" x2="20" y2="50" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <line x1="80" y1="50" x2="92" y2="50" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <line x1="20" y1="20" x2="28" y2="28" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <line x1="72" y1="72" x2="80" y2="80" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <line x1="20" y1="80" x2="28" y2="72" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <line x1="72" y1="28" x2="80" y2="20" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
            </svg>`;
            localStorage.setItem('radioTheme', 'dark');
        } else {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
            themeIcon.className = 'ctrl-icon moon-icon';
            themeIcon.innerHTML = `<svg viewBox="0 0 100 100" fill="currentColor">
                <path d="M50,10 A40,40 0 1,0 85,75 A35,35 0 0,1 50,10 Z"/>
            </svg>`;
            localStorage.setItem('radioTheme', 'light');
        }
    }
    
    function toggleTheme() {
        const isDark = document.body.classList.contains('dark-mode');
        setTheme(isDark ? 'light' : 'dark');
    }
    
    const savedTheme = localStorage.getItem('radioTheme');
    setTheme(savedTheme === 'dark' ? 'dark' : 'light');

    // 歌曲信息渐隐渐显
    let isUpdatingText = false;
    let pendingUpdate = null;
    
    function updateUINewWithFade(song) {
        const parts = song.name.split(' - ');
        const singer = parts[0] || '';
        const music = parts.slice(1).join(' - ') || song.name;
        
        const songNameEl = document.getElementById('songName');
        const artistNameEl = document.getElementById('artistName');
        const songWrapper = document.getElementById('songNameWrapper');
        const artistWrapper = document.getElementById('artistNameWrapper');
        
        if (!songNameEl || !artistNameEl) return;
        
        if (isUpdatingText) {
            pendingUpdate = { music, singer };
            return;
        }
        
        isUpdatingText = true;
        
        if (songWrapper) songWrapper.classList.add('fade-out');
        if (artistWrapper) artistWrapper.classList.add('fade-out');
        
        setTimeout(() => {
            songNameEl.innerText = music;
            artistNameEl.innerText = singer;
            document.title = `${music} - ${singer}`;
            
            if (songWrapper) songWrapper.classList.remove('fade-out');
            if (artistWrapper) artistWrapper.classList.remove('fade-out');
            
            setTimeout(() => {
                isUpdatingText = false;
                adjustFontSize();
                if (pendingUpdate) {
                    const next = pendingUpdate;
                    pendingUpdate = null;
                    const fakeSong = { name: `${next.singer} - ${next.music}` };
                    updateUINewWithFade(fakeSong);
                }
            }, 50);
        }, 200);
    }
    
    function updateUINew(song) {
        updateUINewWithFade(song);
    }

    function updateProgress() {
        const progressFill = document.getElementById('progressFill');
        if (audio.duration && !isNaN(audio.duration) && isPlaying) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
        }
    }
    
    function resetProgress() {
        document.getElementById('progressFill').style.width = '0%';
    }

    function clearLoadTimer() {
        if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; }
    }

    function updateWaveRipple(playing) {
        const wrapper = document.getElementById('playIconWrapper');
        if (wrapper) {
            if (playing) wrapper.classList.add('playing-ripple');
            else wrapper.classList.remove('playing-ripple');
        }
    }

    function updatePlayPauseIcons(playing) {
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        if (playIcon && pauseIcon) {
            if (playing) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'flex';
            } else {
                playIcon.style.display = 'flex';
                pauseIcon.style.display = 'none';
            }
        }
    }

    function playSong(song, autoPlay = true) {
        if (isSwitching) return;
        isSwitching = true;
        clearLoadTimer();
        currentSong = song;
        updateUINew(song);
        audio.pause();
        audio.src = song.url;
        audio.volume = volume;
        
        if (autoPlay && isPlaying) {
            loadTimer = setTimeout(() => {
                if (isPlaying && !isSwitching) nextSong();
            }, BUFFER_TIMEOUT);
            
            audio.play().then(() => {
                clearLoadTimer();
                isSwitching = false;
                resetProgress();
                updateWaveRipple(true);
            }).catch(() => {
                clearLoadTimer();
                isSwitching = false;
                setTimeout(() => nextSong(), 500);
            });
        } else {
            isSwitching = false;
            if (!autoPlay) resetProgress();
        }
    }

    function nextSong() {
        if (isSwitching) return;
        clearLoadTimer();
        const next = getNextSong();
        if (next !== promoSong) normalCount++;
        playSong(next, isPlaying);
    }

    function getNextSong() {
        if (normalCount === 7) { normalCount = 0; return promoSong; }
        if (allSongs.length === 0) return promoSong;
        return allSongs[Math.floor(Math.random() * allSongs.length)];
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            clearLoadTimer();
            isPlaying = false;
            updateWaveRipple(false);
            updatePlayPauseIcons(false);
        } else {
            isPlaying = true;
            updateWaveRipple(true);
            updatePlayPauseIcons(true);
            
            if (!hasStarted) {
                hasStarted = true;
                normalCount = 0;
                playSong(promoSong, true);
            } else if (currentSong) {
                clearLoadTimer();
                loadTimer = setTimeout(() => {
                    if (isPlaying && !isSwitching) nextSong();
                }, BUFFER_TIMEOUT);
                audio.play().catch(() => { clearLoadTimer(); nextSong(); });
            } else {
                playSong(promoSong, true);
            }
        }
    }

    function initProgressBar() {
        const progressContainer = document.getElementById('progressBarContainer');
        progressContainer.addEventListener('click', (e) => {
            if (audio.duration && !isNaN(audio.duration)) {
                const rect = progressContainer.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
                updateProgress();
            }
        });
    }

    function bindButtons() {
        document.getElementById('playBtn').onclick = (e) => { e.stopPropagation(); togglePlay(); };
        document.getElementById('nextBtn').onclick = () => { if (!isSwitching) nextSong(); };
        document.getElementById('themeBtn').onclick = () => toggleTheme();
    }

    audio.addEventListener('ended', () => { if (!isSwitching && isPlaying) nextSong(); });
    audio.addEventListener('error', () => { if (!isSwitching && isPlaying) { clearLoadTimer(); nextSong(); } });
    audio.addEventListener('timeupdate', () => { if (isPlaying) updateProgress(); });
    audio.addEventListener('play', () => { setTimeout(() => updateProgress(), 50); });

    window.addEventListener('resize', () => { setTimeout(adjustFontSize, 50); });
    adjustFontSize();

    async function init() {
        try {
            const [hj, qc] = await Promise.all([
                fetch('https://radio.hellyell.com/huaijiu-musiclist.json').then(r => r.json()),
                fetch('https://radio.hellyell.com/qiche-musiclist.json').then(r => r.json())
            ]);
            const all = [...hj, ...qc];
            allSongs = all.filter(item => {
                const singer = item.name.split(' - ')[0];
                return singer !== 'HellYell 怀旧电台' && singer !== 'HellYell 汽车电台' &&
                       singer !== 'HellYell怀旧电台' && singer !== 'HellYell汽车电台' &&
                       item.url && item.url.startsWith('http');
            });
        } catch(e) { allSongs = []; }
        
        updateUINew(promoSong);
        hasStarted = false;
        isPlaying = false;
        currentSong = null;
        normalCount = 0;
        audio.volume = volume;
        bindButtons();
        initProgressBar();
        updateWaveRipple(false);
        updatePlayPauseIcons(false);
    }
    
    window.onload = init;
</script>
</body>
</html>
